

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sistem-manifest-app:latest
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - app-public:/var/www/html/public
      - app-storage:/var/www/html/storage
      - app-bootstrap:/var/www/html/bootstrap/cache

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./.docker/nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf:ro
      - app-public:/var/www/html/public:ro
      - app-storage:/var/www/html/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  db:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-manifest_db}
      MYSQL_USER: ${DB_USERNAME:-manifest_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-manifest_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - db-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  worker:
    image: sistem-manifest-app:latest
    restart: unless-stopped
    depends_on:
      - app
      - redis
      - db
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    command: php artisan queue:work --queue=scans,compliance,default --sleep=3 --tries=3 --timeout=120
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap:/var/www/html/bootstrap/cache

  cron:
    image: sistem-manifest-app:latest
    restart: unless-stopped
    depends_on:
      - app
      - db
      - redis
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap:/var/www/html/bootstrap/cache

volumes:
  db-data:
  redis-data:
  app-public:
  app-storage:
  app-bootstrap:
